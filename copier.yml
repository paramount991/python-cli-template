# Copier 模板配置
# 文档: https://copier.readthedocs.io/

_subdirectory: template

_tasks:
  - "uv sync"
  - "uv run ruff check --fix ."

_message_after_update: "更新完成。请检查 pyproject.toml、ruff.toml 是否有冲突，然后运行 uv sync && uv run ruff check ."

# ==============================
# 通用项目配置（无业务侵入）
# ==============================

project_name:
  type: str
  help: 项目全称（如：My Awesome Project）
  default: "{{ _folder_name }}"

project_slug:
  type: str
  help: 项目短名（URL / 文件夹使用）
  default: "{{ project_name | replace(' ', '-') }}"

package_slug:
  type: str
  help: Python 包名（import 使用）
  default: "{{ project_slug | lower | replace('-', '_') }}"


project_description:
  type: str
  help: 项目一句话描述
  default: "A modular, extensible Python CLI framework"

project_version:
  type: str
  help: 初始版本号
  default: "0.1.0"

python_version:
  type: str
  help: 最低 Python 版本
  choices:
    - "3.12"
  default: "3.12"

author_name:
  type: str
  help: 作者名称
  default: "Your Name"

author_email:
  type: str
  help: 作者邮箱
  default: "your@email.com"

github_username:
  type: str
  help: GitHub 用户名
  default: "your-username"

# ==============================
# 功能开关（通用模板）
# ==============================

with_docs:
  type: bool
  help: 是否包含 Quarto 文档站点
  default: true

with_tests:
  type: bool
  help: 是否包含 pytest 测试
  default: true

with_example:
  type: bool
  help: 是否包含示例业务模块（方便二次开发）
  default: true

example_name:
  type: str
  help: 示例模块名称（会生成命令 + 包结构）
  default: "demo"
  when: "{{ with_example }}"

# ==============================
# 自动排除不需要的文件
# ==============================
_exclude:
  # 示例模块
  - "{% if not with_example %}src/{{ package_slug }}/{{ example_name }}/{% endif %}"
  - "{% if not with_example %}src/{{ package_slug }}/cli/commands/{{ example_name }}_cmd.py{% endif %}"
  # 文档
  - "{% if not with_docs %}docs/{% endif %}"
  # 测试
  - "{% if not with_tests %}tests/{% endif %}"